<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHIME TEST</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    font-family:
        "굴림",
        Gulim,
        "돋움",
        Dotum,
        sans-serif !important;
}

body{
    width:100%;
    height:100vh;

    background:#0b0f14;

    color:#d7dde5;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

.title{
    font-size:38px;

    margin-bottom:14px;

    color:#ffffff;
}

.status{
    font-size:15px;

    color:#73ffab;

    margin-bottom:40px;
}

.play-btn{
    width:240px;
    height:54px;

    background:#465362;

    border:1px solid #8f9baa;

    color:#ffffff;

    font-size:15px;

    cursor:pointer;
}

.play-btn:hover{
    background:#566577;
}

</style>
</head>
<body>

<div class="title">
    CHIME TEST
</div>

<div class="status">
    chime/chime7.mp3
</div>

<button class="play-btn" onclick="playAudio()">
    방송 재생
</button>

<audio id="player">
    <source src="chime/chime7.mp3" type="audio/mpeg">
</audio>

<script>

function playAudio(){

    const player =
        document.getElementById('player');

    player.play();

}

</script>

</body>
</html>
